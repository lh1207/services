networks:
  ai:
    name: ai

volumes:
  ollama_data:

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "0.0.0.0:11434:11434"  # Exposed to LAN so Optiplex Open WebUI can reach it
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai
    # --- Uncomment to enable NVIDIA GPU support ---
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
