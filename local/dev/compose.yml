networks:
  dev:
    name: dev

volumes:
  pgadmin_data:

services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@local.dev
      PGADMIN_DEFAULT_PASSWORD: devpass
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - dev
    # Postgres is running on the Optiplex at 192.168.50.20:5432
    # Add it as a server in pgAdmin using that address
