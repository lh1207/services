networks:
  ai:
    name: ai

volumes:
  ollama_data:

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "0.0.0.0:11434:11434"  # LAN-exposed so Open WebUI on Optiplex can reach it
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai
