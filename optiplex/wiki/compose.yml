networks:
  wiki:
    name: wiki

volumes:
  bookstack_data:
  bookstack_db_data:

services:
  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: bookstack
    restart: unless-stopped
    ports:
      - "6875:80"
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/New_York
      APP_KEY: base64:rdPu9zJFiKZ+JwEtUUGGmfE2Hv9jyvsws8anWxtCH7Y=
      APP_URL: http://bookstack.localhost
      DB_HOST: bookstack-db
      DB_PORT: 3306
      DB_USER: bookstack
      DB_PASS: bookstackpass
      DB_DATABASE: bookstack
    volumes:
      - bookstack_data:/config
    networks:
      - wiki
    depends_on:
      - bookstack-db

  bookstack-db:
    image: lscr.io/linuxserver/mariadb:latest
    container_name: bookstack-db
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/New_York
      MYSQL_ROOT_PASSWORD: rootpassword   # Change before deploying
      MYSQL_DATABASE: bookstack
      MYSQL_USER: bookstack
      MYSQL_PASSWORD: bookstackpass
    volumes:
      - bookstack_db_data:/config
    networks:
      - wiki
