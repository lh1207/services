networks:
  ai:
    name: ai

volumes:
  openwebui_data:

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      OLLAMA_BASE_URL: http://192.168.50.60:11434  # Ollama on Mac
    volumes:
      - openwebui_data:/app/backend/data
    networks:
      - ai
