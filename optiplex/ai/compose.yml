networks:
  ai:
    name: ai

volumes:
  openwebui_data:

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      # Point back to Ollama running on your Mac — replace YOUR_MAC_IP
      # Run: ipconfig getifaddr en0 on your Mac to find it
      OLLAMA_BASE_URL: http://YOUR_MAC_IP:11434
    volumes:
      - openwebui_data:/app/backend/data
    networks:
      - ai
