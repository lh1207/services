networks:
  databases:
    name: databases

volumes:
  postgres_data:
  redis_data:

services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    ports:
      - "0.0.0.0:5432:5432"  # Exposed to LAN for pgAdmin on Mac
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: localdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - databases

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "0.0.0.0:6379:6379"  # Exposed to LAN if needed by local dev
    volumes:
      - redis_data:/data
    networks:
      - databases
